<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
</head>

<body>

<div class="dashboard">

    <div class="topbar">

        <div>
            <h1>RealTime Chat</h1>
            <p id="welcome"></p>
        </div>

        <button id="logout">Logout</button>

    </div>

    <div class="grid">

        <div class="panel">

            <h2>🔍 Search Users</h2>

            <input
                type="text"
                id="search"
                placeholder="Search username">

            <button onclick="searchUsers()">
                Search
            </button>

            <div id="users"></div>

        </div>

        <div class="panel">

            <h2>📨 Friend Requests</h2>

            <div id="requests"></div>

        </div>

        <div class="panel">

            <h2>👥 Friends</h2>

            <div id="friends"></div>

        </div>

    </div>

</div>

<script src="js/dashboard.js"></script>

</body>
</html>
